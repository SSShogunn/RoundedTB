name: CI / Release

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        default: 'false'
        type: choice
        options: [ 'true', 'false' ]
      tag_name:
        description: 'Release tag (e.g. v1.0.1) — required if creating a release'
        required: false
        type: string

jobs:
  build:
    name: Build & Release
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore RoundedTB/RoundedTB.csproj

      - name: Build (CI check)
        run: dotnet build RoundedTB/RoundedTB.csproj -c Release --no-restore

      # ── Release steps — only run on version tags or manual trigger ──────────

      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        id: tag
        run: |
          $t = if ("${{ github.ref_name }}" -ne "master") { "${{ github.ref_name }}" } else { "${{ inputs.tag_name }}" }
          echo "value=$t" >> $env:GITHUB_OUTPUT

      - name: Publish (single-file, self-contained, win-x64)
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        run: >
          dotnet publish RoundedTB/RoundedTB.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Stamp version into installer script
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        run: |
          $ver = "${{ steps.tag.outputs.value }}".TrimStart('v')
          (Get-Content installer.iss) -replace '#define AppVersion ".*"', "#define AppVersion `"$ver`"" |
            Set-Content installer.iss

      - name: Build installer (Inno Setup)
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: installer-output/RoundedTB-*-Setup.exe
          generate_release_notes: true
