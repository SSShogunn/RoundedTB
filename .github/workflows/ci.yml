name: CI / Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        default: 'false'
        type: choice
        options: [ 'true', 'false' ]
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — required if creating a release'
        required: false
        type: string

jobs:
  build:
    name: Build & Release
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore RoundedTB/RoundedTB.csproj

      - name: Build
        run: dotnet build RoundedTB/RoundedTB.csproj -c Release --no-restore

      - name: Publish (self-contained, win-x64)
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        run: >
          dotnet publish RoundedTB/RoundedTB.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -o ./publish

      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        id: tag
        run: |
          $t = if ("${{ github.ref_name }}" -ne "master") { "${{ github.ref_name }}" } else { "${{ inputs.tag_name }}" }
          echo "value=$t" >> $env:GITHUB_OUTPUT

      - name: Zip release artifact
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        run: Compress-Archive -Path ./publish/RoundedTB.exe -DestinationPath ./RoundedTB-${{ steps.tag.outputs.value }}-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ./RoundedTB-${{ steps.tag.outputs.value }}-win-x64.zip
          generate_release_notes: true
